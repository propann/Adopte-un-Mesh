services:
  api:
    build: ../apps/api
    env_file: ../.env
    volumes:
      - adopt_data:/data
    ports:
      - "8000:8000"
    restart: unless-stopped

  web:
    image: nginx:1.27-alpine
    volumes:
      - ../apps/web:/usr/share/nginx/html:ro
      - ../configs/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2
    volumes:
      - ../configs/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    ports:
      - "1883:1883"
    restart: unless-stopped

  radio-bridge:
    build: ../services/radio-bridge
    env_file: ../.env
    depends_on:
      - api
    restart: unless-stopped

volumes:
  adopt_data:
  mosquitto_data:
  mosquitto_log:
