services:
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    env_file:
      - ../.env
    volumes:
      - adopt_data:/data
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      - mosquitto

  web:
    image: nginx:1.27-alpine
    volumes:
      - ../apps/web:/usr/share/nginx/html:ro
      - ../configs/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      - api

  mosquitto:
    image: eclipse-mosquitto:2
    volumes:
      - ../configs/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mqtt_data:/mosquitto/data
      - mqtt_logs:/mosquitto/log
    ports:
      - "1883:1883"
    restart: unless-stopped

  radio-bridge:
    build:
      context: ..
      dockerfile: services/radio-bridge/Dockerfile
    env_file:
      - ../.env
    devices:
      - "${MESHTASTIC_SERIAL_PORT:-/dev/ttyUSB0}:${MESHTASTIC_SERIAL_PORT:-/dev/ttyUSB0}"
    restart: unless-stopped
    depends_on:
      - api
      - mosquitto

volumes:
  adopt_data:
  mqtt_data:
  mqtt_logs:
