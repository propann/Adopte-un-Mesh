services:
  api:
    build:
      context: ../apps/api
    env_file:
      - ../.env
    volumes:
      - /srv/adopte-un-mesh/data:/data
      - /srv/adopte-un-mesh/backups:/backups
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 5

  web:
    image: nginx:1.27-alpine
    volumes:
      - ../apps/web:/usr/share/nginx/html:ro
      - ../configs/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    volumes:
      - ../configs/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - /srv/adopte-un-mesh/mosquitto/data:/mosquitto/data
      - /srv/adopte-un-mesh/mosquitto/log:/mosquitto/log
    expose:
      - "1883"
    restart: unless-stopped

  radio-bridge:
    build:
      context: ../services/radio-bridge
    env_file:
      - ../.env
    devices:
      - "${MESHTASTIC_SERIAL_PORT:-/dev/ttyUSB0}:${MESHTASTIC_SERIAL_PORT:-/dev/ttyUSB0}"
    group_add:
      - dialout
    depends_on:
      api:
        condition: service_healthy
      mosquitto:
        condition: service_started
    restart: unless-stopped

networks:
  default:
    name: adopte-un-mesh
