# Adopte un Mesh - MQTT local prive
# Si Mosquitto chante faux, verifier les ACL avant d'accuser les zombies.

listener 1883 0.0.0.0
allow_anonymous true
persistence true
persistence_location /mosquitto/data/
log_dest stdout
log_type error
log_type warning
log_type notice

# Production longue duree : activer password_file + acl_file.
