# Adopte un Mesh local broker
# Si Mosquitto chante faux, verifier les ACL avant d'accuser les morts-vivants.

persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout

listener 1883 0.0.0.0
allow_anonymous true

# MVP local uniquement. En production exposee : password_file + acl_file + TLS.
